name: Build Docker Image and Update K8s Manifest

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/**'
      - '.github/workflows/**'

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=build-${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t yashikaa1/studypartner:${IMAGE_TAG} .

      - name: Push Docker image
        run: |
          docker push yashikaa1/studypartner:${IMAGE_TAG}

      - name: Update deployment image tag
        run: |
          sed -i "s|image: yashikaa1/studypartner:.*|image: yashikaa1/studypartner:${IMAGE_TAG}|g" k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${IMAGE_TAG}" || echo "No changes to commit"
          git push
